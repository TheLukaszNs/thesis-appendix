name: simple-gpt5-mini
description: "Baseline: simple-workflow with GPT-5-mini"

api:
  baseUrl: http://localhost:4111
  workflowId: complexWorkflow
  model: vercel/openai/gpt-5-mini
  timeoutMs: 120000

testset: testsets/example.jsonl

execution:
  repetitions: 3
  concurrency: 2

trace:
  enabled: true
  database: postgresql://postgres:postgres@localhost:5433/mastra
  pollTimeoutMs: 15000
  pollIntervalMs: 1000

output:
  dir: experiments

metadata:
  condition: baseline
  hypothesis: "GPT-5-mini achieves >80% pass@1"
  tags: [simple-workflow, gpt-5-mini]
